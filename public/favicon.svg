<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Green recycling symbol -->
  <circle cx="32" cy="32" r="30" fill="#10b981"/>
  
  <!-- Recycling arrows forming triangle -->
  <path d="M32 14 L38 24 L26 24 Z" fill="white"/>
  <path d="M38 24 L44 22 L40 32 L38 24" fill="white"/>
  
  <path d="M44 40 L38 38 L44 30 Z" fill="white"/>
  <path d="M38 38 L37 46 L28 40 L38 38" fill="white"/>
  
  <path d="M20 40 L26 38 L20 30 Z" fill="white"/>
  <path d="M26 38 L27 46 L20 40" fill="white"/>
  
  <!-- Center AI dot -->
  <circle cx="32" cy="32" r="4" fill="#6366f1"/>
  
  <!-- Arrows with better recycling symbol -->
  <g transform="translate(32, 32)">
    <!-- Top arrow -->
    <path d="M0,-14 L-3,-8 L3,-8 Z M0,-14 L-1,-6" stroke="white" stroke-width="1.5" fill="white"/>
    
    <!-- Bottom-right arrow -->
    <path d="M12.1,7 L9.5,11.6 L14.1,9 Z M12.1,7 L7.5,5.2" stroke="white" stroke-width="1.5" fill="white" transform="rotate(120)"/>
    
    <!-- Bottom-left arrow -->
    <path d="M12.1,7 L9.5,11.6 L14.1,9 Z M12.1,7 L7.5,5.2" stroke="white" stroke-width="1.5" fill="white" transform="rotate(240)"/>
  </g>
</svg>
